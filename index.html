<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Fast Pi Generator</title>

<style>

body{
background:black;
color:#00ff00;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:800px;
}

h1{
text-align:center;
}

.output{
border:1px solid #00ff00;
padding:15px;
min-height:120px;
word-break:break-all;
overflow:auto;
max-height:200px;
}

.controls{
margin-top:15px;
}

input[type=range]{
width:100%;
}

</style>
</head>

<body>

<div class="container">

<h1>π ULTRA GENERATOR</h1>

<div class="controls">
Speed
<input type="range" id="speed" min="1" max="50000" value="1000">
</div>

<div>Digits Generated: <span id="count">0</span></div>

<div class="output" id="pi">3.</div>

</div>

<script>

let q=1n, r=0n, t=1n, k=1n, n=3n, l=3n;

function nextDigit(){

if((4n*q+r-t) < (n*t)){

let digit=n;

r=10n*(r-n*t);
n=((10n*(3n*q+r))/t)-(10n*n);
q=q*10n;

return digit;

}

else{

r=(2n*q+r)*l;
n=(q*(7n*k)+2n+r*l)/(t*l);
q=q*k;
t=t*l;
l=l+2n;
k=k+1n;

return null;

}

}

let output=document.getElementById("pi");
let counter=document.getElementById("count");

let digits=0;

function loop(){

let speed=document.getElementById("speed").value;

let chunk="";

for(let i=0;i<speed;i++){

let d=nextDigit();

if(d!==null){

chunk+=d;
digits++;

}

}

output.textContent+=chunk;
counter.textContent=digits;

if(output.textContent.length>10000){
output.textContent=output.textContent.slice(-10000);
}

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
